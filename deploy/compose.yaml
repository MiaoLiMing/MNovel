services:
  api:
    build:
      context: ../apps/api
    image: mnovel-api:local
    container_name: mnovel-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:18000:8000"
    volumes:
      - /opt/mnovel/data:/app/data
      - /opt/mnovel/backup:/app/backup
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
