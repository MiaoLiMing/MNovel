name: Build unsigned iOS IPA

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: App version, for example 1.0.0
        required: true
        default: 1.0.0
        type: string
      build_number:
        description: Positive integer build number
        required: true
        default: "1"
        type: string

permissions:
  contents: read

concurrency:
  group: unsigned-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Show toolchain
        run: |
          flutter --version
          xcodebuild -version

      - name: Install Dart dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Analyze
        working-directory: apps/mobile
        run: flutter analyze

      - name: Test
        working-directory: apps/mobile
        run: flutter test

      - name: Build iOS app without signing
        working-directory: apps/mobile
        run: >-
          flutter build ios
          --release
          --no-codesign
          --build-name="${{ inputs.build_name }}"
          --build-number="${{ inputs.build_number }}"

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail
          app_path="apps/mobile/build/ios/iphoneos/Runner.app"
          output_dir="apps/mobile/build/unsigned-ipa"

          test -d "$app_path"
          rm -rf "$output_dir"
          mkdir -p "$output_dir/Payload"
          cp -Rp "$app_path" "$output_dir/Payload/Runner.app"

          cd "$output_dir"
          zip -ry MNovel-unsigned.ipa Payload
          /usr/bin/shasum -a 256 MNovel-unsigned.ipa > MNovel-unsigned.ipa.sha256
          /usr/bin/unzip -t MNovel-unsigned.ipa

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: MNovel-unsigned-ios-${{ github.run_number }}
          path: |
            apps/mobile/build/unsigned-ipa/MNovel-unsigned.ipa
            apps/mobile/build/unsigned-ipa/MNovel-unsigned.ipa.sha256
          if-no-files-found: error
          retention-days: 14
