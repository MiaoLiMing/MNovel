name: mnovel
description: 私人小说阅读与书架应用。
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  http: ^1.6.0
  flutter_js: ^0.8.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "yes"
  ios: "yes"
  web:
    generate: true
    image_path: "assets/logo.png"
  image_path: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/covers/
    - assets/design/
    - assets/logo.png
